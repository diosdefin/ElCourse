<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        @font-face {
            font-family: 'Roboto';
            src: url('data:application/x-font-ttf;base64,{{ font_base64 }}');
        }

        @page {
            size: A4;
            margin: 1.5cm;
        }

        body,
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p,
        div,
        span,
        .name,
        .skill-item {
            font-family: 'Roboto', sans-serif !important;
            color: #333;
            -pdf-font-encoding: identity-H;
        }

        .header {
            border-bottom: 2px solid #4f46e5;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .name {
            font-size: 28px;
            font-weight: bold;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #0f172a;
            margin: 18px 0 8px;
        }

        .bio {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            line-height: 1.5;
        }

        .skill-item {
            background-color: #f1f5f9;
            padding: 5px;
            margin-bottom: 5px;
            border-left: 3px solid #10b981;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1 class="name">{{ username }}</h1>
        <p>Email: {{ email }}</p>
    </div>

    <div class="section-title">О себе</div>
    <div class="bio">
        {% if bio %}
        {{ bio }}
        {% else %}
        Кандидат пока не добавил описание.
        {% endif %}
    </div>

    <div class="section-title">Подтвержденные навыки</div>
    <div>
        {% for skill in skills %}
        <div class="skill-item">✓ {{ skill.name }}</div>
        {% empty %}
        <p>Навыков пока нет</p>
        {% endfor %}
    </div>
</body>

</html>
